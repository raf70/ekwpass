# Install on the host as /etc/nginx/sites-available/ekwpass, then
#   ln -sf /etc/nginx/sites-available/ekwpass /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#
# certbot will add a second server { listen 443 ssl; ... } block: run
#   certbot --nginx -d your.domain
#
# Expects the Docker frontend to listen on 127.0.0.1:3000 (see docker-compose.prod.yml).

server {
    listen 80;
    server_name my_servername.com;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_http_version 1.1;
    }
}
