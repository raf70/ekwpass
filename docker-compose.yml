services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ekwpass
      POSTGRES_USER: ekwpass
      POSTGRES_PASSWORD: ekwpass_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ekwpass"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    ports:
      - "8081:8080"
    environment:
      DATABASE_URL: postgres://ekwpass:ekwpass_dev@db:5432/ekwpass?sslmode=disable
      JWT_SECRET: dev-secret-change-in-production
      PORT: "8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
